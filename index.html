/* AquoraX button feedback */
button,.tool,.tab,.iconBtn{
  position:relative;
  overflow:hidden;
  transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
}
button.aqxPressed,.tool.aqxPressed,.tab.aqxPressed,.iconBtn.aqxPressed{
  transform:scale(.96);
  filter:brightness(1.18);
  box-shadow:0 0 28px rgba(0,229,255,.22)!important;
}
.aqxRipple{
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:rgba(0,229,255,.45);
  transform:translate(-50%,-50%) scale(1);
  pointer-events:none;
  animation:aqxRipple .55s ease-out forwards;
}
@keyframes aqxRipple{
  to{transform:translate(-50%,-50%) scale(16);opacity:0}
}
#aqxToast{
  position:fixed;
  left:50%;
  bottom:92px;
  transform:translateX(-50%) translateY(20px);
  background:rgba(2,8,20,.96);
  border:1px solid rgba(0,229,255,.35);

  font-weight:900;
  font-size:13px;
  opacity:0;
  z-index:9999;
  box-shadow:0 0 30px rgba(0,229,255,.14);
  transition:opacity .2s ease, transform .2s ease;
}
#aqxToast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

<script>
/* AquoraX Chunked Cloud Sync Controller v13 - No Local Backup Duplication */
(function(){
  const AQX_CLOUD_LAST_SYNC_KEY = "aquorax_cloud_last_sync_v1";
  const CHUNK_SIZE = 650000;

  window.aqxAuthReady = window.aqxAuthReady || false;
  window.aqxCurrentUser = window.aqxCurrentUser || null;

  function formatTime(iso){
    if(!iso) return "--";
    try { return new Date(iso).toLocaleString(); } catch(e){ return iso; }
  }

  function allLocalData(){
    const data = {};
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k) data[k] = localStorage.getItem(k);
    }
    return data;
  }

  function ready(){
    return Boolean(window.aqxFirebaseReady && window.aqxAuth && window.aqxDb && window.aqxFirebaseTools);
  }

  function user(){
    return (window.aqxAuth && window.aqxAuth.currentUser) || window.aqxCurrentUser || null;
  }

  function countSnapshot(data){
    const counts = { tanks:0, tests:0, corals:0, photos:0, equipment:0, reminders:0 };
    try{
      if(data["reefos_tanks"]) counts.tanks = JSON.parse(data["reefos_tanks"]).length || 0;
      Object.keys(data).forEach(k=>{
        try{
          if(k.startsWith("reefos_tests_")) counts.tests += JSON.parse(data[k] || "[]").length || 0;
          if(k.startsWith("reefos_equipment_")) counts.equipment += JSON.parse(data[k] || "[]").length || 0;
          if(k.startsWith("reefos_reminders_")) counts.reminders += JSON.parse(data[k] || "[]").length || 0;
          if(k.startsWith("reefos_corals_")){
            const cs = JSON.parse(data[k] || "[]");
            counts.corals += cs.length || 0;
            cs.forEach(c => counts.photos += ((c.photos || []).length || 0));
          }
        }catch(e){}
      });
    }catch(e){}
    return counts;
  }

  function splitString(str){
    const chunks = [];
    for(let i=0;i<str.length;i+=CHUNK_SIZE){
      chunks.push(str.slice(i, i + CHUNK_SIZE));
    }
    return chunks;
  }

  function safeCloudMarker(reason){
    try{
      localStorage.setItem("aquorax_last_cloud_action", JSON.stringify({
        reason: reason || "cloud action",
        at: new Date().toISOString()
      }));
    }catch(e){
      console.warn("Cloud marker skipped due to storage quota", e);
    }
  }

  window.aqxSetSyncBadge = function(state, text){
    const badge = document.getElementById("aqxSyncBadge");
    if(!badge) return;
    badge.classList.remove("good","warn","bad");
    badge.classList.add(state || "warn");
    badge.textContent = text || "🟡 Checking";
  };

  window.aqxRenderSyncUI = function(){
    const u = user();
    const account = document.getElementById("aqxAccountLine");
    const local = document.getElementById("aqxLocalSavedInfo");
    const cloud = document.getElementById("aqxCloudSavedInfo");
    const header = document.getElementById("aqxCloudStatusText");

    const localSaved = localStorage.getItem("aquorax_last_saved_v1") || localStorage.getItem("aquorax_last_saved");
    const cloudSaved = localStorage.getItem(AQX_CLOUD_LAST_SYNC_KEY);

    if(local) local.textContent = formatTime(localSaved);
    if(cloud) cloud.textContent = formatTime(cloudSaved);

    if(!window.aqxFirebaseReady){
      if(account) account.textContent = "Firebase not ready";
      if(header) header.textContent = "Not Ready";
      aqxSetSyncBadge("bad","🔴 Firebase not ready");
      return;
    }

    if(!window.aqxAuthReady){
      if(account) account.textContent = "Checking login status...";
      if(header) header.textContent = "Checking";
      aqxSetSyncBadge("warn","🟡 Checking");
      return;
    }

    if(u){
      if(account) account.textContent = "Logged in as " + (u.email || "AquoraX user");
      const synced = !!cloudSaved;
      if(header) header.textContent = synced ? "Synced" : "Logged In";
      aqxSetSyncBadge(synced ? "good" : "warn", synced ? "🟢 Synced / Ready" : "🟡 Logged in");
      return;
    }

    if(account) account.textContent = "Not logged in";
    if(header) header.textContent = "Offline";
    aqxSetSyncBadge("warn","🟡 Offline / Local only");
  };

  window.aqxLogin = async function(){
    try{
      if(!ready()){ alert("Firebase is still starting. Wait 2 seconds and try again."); return; }
      const email = prompt("Enter your AquoraX email"); if(!email) return;
      const password = prompt("Enter your password"); if(!password) return;
      aqxSetSyncBadge("warn","🟡 Logging in...");
      const result = await window.aqxFirebaseTools.signInWithEmailAndPassword(window.aqxAuth, email, password);
      window.aqxAuthReady = true;
      window.aqxCurrentUser = result.user || window.aqxAuth.currentUser || null;
      aqxRenderSyncUI();
      if(typeof showAqxToast === "function") showAqxToast("Logged in");
    }catch(e){
      alert("Login failed: " + (e.message || e));
      aqxRenderSyncUI();
    }
  };

  window.aqxRegister = async function(){
    try{
      if(!ready()){ alert("Firebase is still starting. Wait 2 seconds and try again."); return; }
      const email = prompt("Create account email"); if(!email) return;
      const password = prompt("Create a password - minimum 6 characters"); if(!password) return;
      if(password.length < 6){ alert("Password must be at least 6 characters."); return; }
      aqxSetSyncBadge("warn","🟡 Creating account...");
      const result = await window.aqxFirebaseTools.createUserWithEmailAndPassword(window.aqxAuth, email, password);
      window.aqxAuthReady = true;
      window.aqxCurrentUser = result.user || window.aqxAuth.currentUser || null;
      aqxRenderSyncUI();
      if(typeof showAqxToast === "function") showAqxToast("Account created");
    }catch(e){
      alert("Create account failed: " + (e.message || e));
      aqxRenderSyncUI();
    }
  };

  window.aqxLogout = async function(){
    try{
      if(!ready()){ alert("Firebase is still starting. Wait 2 seconds and try again."); return; }
      await window.aqxFirebaseTools.signOut(window.aqxAuth);
      window.aqxAuthReady = true;
      window.aqxCurrentUser = null;
      aqxRenderSyncUI();
      if(typeof showAqxToast === "function") showAqxToast("Logged out");
    }catch(e){
      alert("Logout failed: " + (e.message || e));
    }
  };

  window.aqxCloudSave = async function(){
    try{
      if(!ready()){ alert("Firebase is still starting. Wait 2 seconds and try again."); return; }
      const u = user();
      if(!u){ alert("Login first, then save to cloud."); return; }

      // Do NOT call aqxCreateSafetyBackup here. Big coral base64 images can exceed browser quota.
      safeCloudMarker("before chunked cloud save");

      const snapshot = allLocalData();
      if(typeof window.aqxAllCoralImages === "function"){
        snapshot["aquorax_coral_image_store_v18"] = JSON.stringify(await window.aqxAllCoralImages());
      }
      const counts = countSnapshot(snapshot);
      const packed = JSON.stringify(snapshot);
      const chunks = splitString(packed);

      aqxSetSyncBadge("warn","🟡 Saving...");

      const metaRef = window.aqxFirebaseTools.doc(window.aqxDb, "aquoraxUsers", u.uid);
      await window.aqxFirebaseTools.setDoc(metaRef, {
        app: "AquoraX",
        version: "chunked-v13",
        userEmail: u.email || "",
        savedAt: new Date().toISOString(),
        updatedAt: window.aqxFirebaseTools.serverTimestamp(),
        chunkCount: chunks.length,
        totalChars: packed.length,
        counts
      }, { merge: true });

      for(let i=0;i<chunks.length;i++){
        const chunkRef = window.aqxFirebaseTools.doc(window.aqxDb, "aquoraxUsers", u.uid, "chunks", String(i));
        await window.aqxFirebaseTools.setDoc(chunkRef, {
          index: i,
          data: chunks[i],
          updatedAt: window.aqxFirebaseTools.serverTimestamp()
        });
      }

      localStorage.setItem(AQX_CLOUD_LAST_SYNC_KEY, new Date().toISOString());
      aqxRenderSyncUI();

      alert("Cloud save complete. Tanks: " + counts.tanks + " | Tests: " + counts.tests + " | Coral photos: " + counts.photos + " | Chunks: " + chunks.length);
      if(typeof showAqxToast === "function") showAqxToast("Saved to cloud");
    }catch(e){
      console.error("Chunked cloud save failed", e);
      aqxSetSyncBadge("bad","🔴 Save failed");
      alert("Cloud save failed: " + (e.message || e));
    }
  };

  window.aqxCloudLoad = async function(){
    try{
      if(!ready()){ alert("Firebase is still starting. Wait 2 seconds and try again."); return; }
      const u = user();
      if(!u){ alert("Login first, then load from cloud."); return; }

      if(!confirm("Load your cloud save onto this device? This will replace current local AquoraX data.")) return;
      safeCloudMarker("before chunked cloud load");

      aqxSetSyncBadge("warn","🟡 Loading...");

      const metaRef = window.aqxFirebaseTools.doc(window.aqxDb, "aquoraxUsers", u.uid);
      const metaSnap = await window.aqxFirebaseTools.getDoc(metaRef);

      if(!metaSnap.exists()){
        alert("No cloud save found for this account yet.");
        aqxRenderSyncUI();
        return;
      }

      const meta = metaSnap.data();
      let store = null;

      if(meta.chunkCount && meta.chunkCount > 0){
        let packed = "";
        for(let i=0;i<meta.chunkCount;i++){
          const chunkRef = window.aqxFirebaseTools.doc(window.aqxDb, "aquoraxUsers", u.uid, "chunks", String(i));
          const chunkSnap = await window.aqxFirebaseTools.getDoc(chunkRef);
          if(!chunkSnap.exists()){
            alert("Cloud chunk missing: " + i + ". Save to cloud again from the main device.");
            aqxRenderSyncUI();
            return;
          }
          packed += chunkSnap.data().data || "";
        }
        store = JSON.parse(packed);
      }else if(meta.localStorage){
        store = meta.localStorage;
      }

      if(!store || typeof store !== "object"){
        alert("Cloud save is invalid or empty.");
        aqxSetSyncBadge("bad","🔴 Bad cloud save");
        return;
      }

      const counts = meta.counts || countSnapshot(store);
      let coralImageStoreV18 = [];
      try{
        if(store["aquorax_coral_image_store_v18"]){
          coralImageStoreV18 = JSON.parse(store["aquorax_coral_image_store_v18"] || "[]");
          delete store["aquorax_coral_image_store_v18"];
        }
      }catch(e){ console.warn("Could not parse coral image cloud store", e); }

      Object.keys(localStorage).forEach(k => {
        if(k.startsWith("reefos_") || k.startsWith("aquorax_") || k.startsWith("AQX_")){
          localStorage.removeItem(k);
        }
      });

      Object.entries(store).forEach(([k,v]) => {
        if(typeof v === "string") localStorage.setItem(k,v);
        else localStorage.setItem(k,JSON.stringify(v));
      });

      if(coralImageStoreV18.length && typeof window.aqxRestoreCoralImages === "function"){
        await window.aqxRestoreCoralImages(coralImageStoreV18);
      }

      localStorage.setItem(AQX_CLOUD_LAST_SYNC_KEY, new Date().toISOString());

      alert("Cloud loaded. Tanks: " + (counts.tanks || 0) + " | Tests: " + (counts.tests || 0) + " | Coral photos: " + (counts.photos || 0) + ". AquoraX will reload now.");
      location.reload();
    }catch(e){
      console.error("Chunked cloud load failed", e);
      aqxSetSyncBadge("bad","🔴 Load failed");
      alert("Cloud load failed: " + (e.message || e));
    }
  };

  window.aqxPromptLogin = window.aqxLogin;

  const boot = setInterval(() => {
    if(window.aqxFirebaseReady || window.aqxAuthReady){
      aqxRenderSyncUI();
      clearInterval(boot);
    }
  }, 250);

  setInterval(aqxRenderSyncUI, 3000);
  setTimeout(aqxRenderSyncUI, 500);

  console.log("AquoraX Chunked Cloud Sync Controller v13 active");
})();
</script>


<script>
/* AquoraX UI Restore Backup Helpers v14 */
(function(){
  function allLocal(){
    const data={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k)data[k]=localStorage.getItem(k);
    }
    return data;
  }

  window.aqxRenderSafetyStatus = function(){
    const el=document.getElementById("aqxLastSaved");
    if(!el)return;
    const last=localStorage.getItem("aquorax_last_saved_v1") || localStorage.getItem("aquorax_last_saved") || localStorage.getItem("aquorax_cloud_last_sync_v1");
    el.textContent = "Last saved: " + (last ? new Date(last).toLocaleString() : "--");
  };

  if(typeof window.exportFullAquoraXBackup !== "function"){
    window.exportFullAquoraXBackup=function(){
      const backup={app:"AquoraX",exportedAt:new Date().toISOString(),localStorage:allLocal()};
      const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="AquoraX-full-backup-"+new Date().toISOString().slice(0,10)+".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    };
  }

  if(typeof window.restoreLastSafetyBackup !== "function"){
    window.restoreLastSafetyBackup=function(){
      alert("No local restore point available in this clean build. Use Load from Cloud or Import Backup.");
    };
  }

  setInterval(()=>{ if(typeof aqxRenderSyncUI==="function") aqxRenderSyncUI(); aqxRenderSafetyStatus(); },2000);
  setTimeout(()=>{ if(typeof aqxRenderSyncUI==="function") aqxRenderSyncUI(); aqxRenderSafetyStatus(); },500);
  console.log("AquoraX UI Restore v14 active");
})();
</script>


<script>
/* AquoraX v1.4.8 reminder notifications - safe add-on */
(function(){
  const AQX_NOTIF_KEY = "aquorax_notification_jobs_v1";
  let aqxNotificationTimers = [];

  function aqxCanNotify(){
    return ("Notification" in window);
  }

  window.aqxUpdateNotificationStatus = function(){
    const el = document.getElementById("aqxNotifyStatus");
    if(!el) return;
    if(!aqxCanNotify()){
      el.textContent = "Notification status: not supported on this browser";
      return;
    }
    el.textContent = "Notification status: " + Notification.permission;
  }

  window.aqxRequestNotificationPermission = async function(){
    if(!aqxCanNotify()){
      alert("Notifications are not supported on this browser.");
      return;
    }
    try{
      const permission = await Notification.requestPermission();
      aqxUpdateNotificationStatus();
      if(permission === "granted"){
        aqxShowNotification("AquoraX notifications enabled", "You’ll now get reminder pings when they are due.");
      }else{
        alert("Notifications were not allowed. Enable them in your browser/site settings to test phone pings.");
      }
    }catch(e){
      alert("Notification permission failed: " + e.message);
    }
  }

  window.aqxShowNotification = async function(title, body){
    if(!aqxCanNotify() || Notification.permission !== "granted") return;
    try{
      if(navigator.serviceWorker && navigator.serviceWorker.ready){
        const reg = await navigator.serviceWorker.ready;
        reg.showNotification(title, {
          body: body || "",
          icon: "icon-192.png",
          badge: "icon-192.png",
          tag: "aquorax-reminder",
          renotify: true,
          requireInteraction: false
        });
      }else{
        new Notification(title, {body: body || "", icon: "icon-192.png"});
      }
    }catch(e){
      try{ new Notification(title, {body: body || ""}); }catch(err){}
    }
  }

  window.aqxSendTestNotification = async function(){
    if(!aqxCanNotify()){
      alert("Notifications are not supported on this browser.");
      return;
    }
    if(Notification.permission !== "granted"){
      await aqxRequestNotificationPermission();
    }
    if(Notification.permission === "granted"){
      aqxShowNotification("AquoraX test ping", "Your reef reminder notifications are working.");
    }
  }

  function aqxReadNotificationJobs(){
    try{return JSON.parse(localStorage.getItem(AQX_NOTIF_KEY) || "[]")}catch(e){return []}
  }

  function aqxWriteNotificationJobs(jobs){
    localStorage.setItem(AQX_NOTIF_KEY, JSON.stringify(jobs));
  }

  window.aqxScheduleReminderNotification = function(reminder){
    if(!reminder || !reminder.date) return;
    const time = reminder.time || "09:00";
    const due = new Date(reminder.date + "T" + time + ":00");
    if(isNaN(due.getTime())) return;

    const jobs = aqxReadNotificationJobs().filter(j => j.id !== reminder.id);
    jobs.push({
      id: reminder.id || ("rem_" + Date.now()),
      name: reminder.name || reminder.type || "AquoraX reminder",
      type: reminder.type || "Reminder",
      date: reminder.date,
      time: time,
      notes: reminder.notes || ""
    });
    aqxWriteNotificationJobs(jobs);
    aqxArmNotificationTimers();
  }

  window.aqxArmNotificationTimers = function(){
    aqxNotificationTimers.forEach(t => clearTimeout(t));
    aqxNotificationTimers = [];

    const now = Date.now();
    const jobs = aqxReadNotificationJobs();
    const futureJobs = [];

    jobs.forEach(job=>{
      const due = new Date(job.date + "T" + (job.time || "09:00") + ":00").getTime();
      if(isNaN(due)) return;
      const delay = due - now;

      if(delay <= 0){
        // If it became due while app was closed, ping shortly after opening.
        if(delay > -1000 * 60 * 60 * 24){
          const timer = setTimeout(()=>{
            aqxShowNotification("AquoraX Reminder", `${job.name} is due now.`);
          }, 1200);
          aqxNotificationTimers.push(timer);
        }
      }else{
        futureJobs.push(job);
        // Browser timers are safest for near-term tests. Long timers are kept and re-armed on app open.
        const maxDelay = 2147483647;
        const timer = setTimeout(()=>{
          aqxShowNotification("AquoraX Reminder", `${job.name} is due now.`);
        }, Math.min(delay, maxDelay));
        aqxNotificationTimers.push(timer);
      }
    });

    // Keep jobs for future re-arming. Remove jobs older than 24h.
    const keep = jobs.filter(job=>{
      const due = new Date(job.date + "T" + (job.time || "09:00") + ":00").getTime();
      return !isNaN(due) && due > now - 1000*60*60*24;
    });
    aqxWriteNotificationJobs(keep);
  }

  // Wrap existing saveReminder safely so all old logic still runs.
  const originalSaveReminder = window.saveReminder;
  if(typeof originalSaveReminder === "function" && !window.aqxReminderNotifyWrapped){
    window.aqxReminderNotifyWrapped = true;
    window.saveReminder = function(){

  }

  function getReminders(){
    try { return typeof rems === "function" ? rems() : []; } catch(e){ return []; }
  }

  function setJobs(jobs){
    localStorage.setItem(NOTIF_KEY, JSON.stringify(jobs));
  }

  window.deleteRem = function(id){

    const a = getReminders().filter(r => String(r.id) !== String(id));
    saveReminders(a);

    const jobs = getJobs().filter(j => String(j.id) !== String(id));

      type: reminder.type || "Reminder",

      time,
      notes: reminder.notes || ""
    });

    getJobs().forEach(job=>{

      if(isNaN(due)) return;
      const delay = due - now;
      if(delay > 0 && delay < 2147483647){

      }
    });
  };

  window.aqxFireDueNotifications = function(){
    if(!("Notification" in window) || Notification.permission !== "granted") return;

    let jobs = getJobs();
    let fired = {};
    try{ fired = JSON.parse(localStorage.getItem(FIRED_KEY) || "{}"); }catch(e){}

    const now = Date.now();
    jobs.forEach(job=>{
      const due = new Date(job.date + "T" + (job.time || "09:00") + ":00").getTime();

        fired[job.id] = true;

    });

    jobs = jobs.filter(job=>{
      const due = new Date(job.date + "T" + (job.time || "09:00") + ":00").getTime();

      if(document.getElementById("remTime")) remTime.value = "";

  window.doneRem = function(id){

          date: a[i].due,
          time: a[i].time || "09:00",
          notes: a[i].notes || ""
        });
      }else{

        setJobs(getJobs().filter(j => String(j.id) !== String(id)));
      }

      saveReminders(a);
      if(typeof render === "function") render();
    }catch(e){

<script>
/* AquoraX Custom Bottom Bar System */
(function(){
  const NAV_KEY = 'aquorax_bottom_nav_layout';

  const bottomNavOptions = [
    {id:'home', label:'Home', icon:'⌂', target:'home', locked:true},
    {id:'test', label:'Test', icon:'⚗', target:'test'},
    {id:'quicktest', label:'Quick', icon:'⚡', target:'quicktest'},
    {id:'dosing', label:'Dose', icon:'💉', target:'dosing'},
    {id:'reminders', label:'Jobs', icon:'⏰', target:'reminders'},
    {id:'growth', label:'Corals', icon:'🪸', target:'growth'},
    {id:'equipment', label:'Kit', icon:'⚙️', target:'equipment'},
    {id:'graphs', label:'Graphs', icon:'📈', target:'graphs'},
    {id:'customise', label:'Style', icon:'🎨', target:'customise'},
    {id:'sponsors', label:'Shops', icon:'🤝', target:'sponsors'},
    {id:'settings', label:'More', icon:'☰', target:'settings'}
  ];

  const defaultBottomNav = [
    {id:'home', show:true},
    {id:'test', show:true},
    {id:'dosing', show:true},
    {id:'growth', show:true},
    {id:'settings', show:true}
  ];

  function readLayout(){
    try{
      const saved = JSON.parse(localStorage.getItem(NAV_KEY) || 'null');
      if(Array.isArray(saved)){
        const ids = saved.map(x=>x.id);
        const missing = bottomNavOptions
          .filter(o=>!ids.includes(o.id))
          .map(o=>({id:o.id, show:false}));
        let layout = saved.filter(x=>bottomNavOptions.some(o=>o.id===x.id)).concat(missing);
        if(!layout.some(x=>x.id==='home')) layout.unshift({id:'home', show:true});
        layout = layout.map(x=>x.id==='home' ? {...x, show:true} : x);
        return layout;
      }
    }catch(e){}
    const ids = defaultBottomNav.map(x=>x.id);
    return defaultBottomNav.concat(
      bottomNavOptions.filter(o=>!ids.includes(o.id)).map(o=>({id:o.id, show:false}))
    );
  }

  function writeLayout(layout){
    localStorage.setItem(NAV_KEY, JSON.stringify(layout));
  }

  function option(id){
    return bottomNavOptions.find(o=>o.id===id) || {id, label:id, icon:'•', target:id};
  }

  function visibleLayout(){
    const layout = readLayout().filter(x=>x.show || x.id==='home');
    // Keep it usable on phones. If users turn on loads, show first 7 with Home forced.
    const home = layout.find(x=>x.id==='home') || {id:'home', show:true};
    const rest = layout.filter(x=>x.id!=='home');
    return [home].concat(rest).slice(0,7);
  }

  function renderBottomNav(){
    const nav = document.getElementById('bottomNav');
    if(!nav) return;

    const current = document.querySelector('section:not(.hidden)')?.id || 'home';
    nav.innerHTML = visibleLayout().map(item=>{
      const meta = option(item.id);
      const active = meta.target === current || item.id === current;
      return `<div class="tab ${active?'active':''}" data-nav-id="${item.id}">
        <span>${meta.icon}</span>${meta.label}
      </div>`;
    }).join('');

    nav.querySelectorAll('.tab').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const meta = option(btn.getAttribute('data-nav-id'));
        if(typeof show === 'function') show(meta.target, btn);
      });
    });
  }

  function renderBottomNavControls(){
    const el = document.getElementById('bottomNavLayoutList');
    if(!el) return;
    const layout = readLayout();
    el.innerHTML = layout.map((item,i)=>{
      const meta = option(item.id);
      const locked = item.id === 'home';
      return `<div class="layoutRow ${locked?'bottomNavLocked':''}">
        <input class="layoutToggle" type="checkbox" id="nav_${item.id}" ${item.show || locked ? 'checked' : ''} ${locked ? 'disabled' : ''}>
        <b>${meta.icon} ${meta.label}${locked ? ' (locked)' : ''}</b>
        <button type="button" class="secondary" onclick="moveBottomNavItem('${item.id}',-1)">↑</button>
        <button type="button" class="secondary" onclick="moveBottomNavItem('${item.id}',1)">↓</button>
      </div>`;
    }).join('') + '<p class="bottomNavMaxNote">Tip: keep the bottom bar to around 5–7 items for the cleanest mobile layout.</p>';
  }

  window.saveBottomNavLayout = function(){
    const layout = readLayout().map(item=>({
      id:item.id,
      show:item.id === 'home' ? true : (document.getElementById('nav_'+item.id)?.checked ?? false)
    }));
    writeLayout(layout);
    renderBottomNav();
    renderBottomNavControls();
    if(typeof aqxToast === 'function') aqxToast('Bottom bar saved');
    else alert('Bottom bar saved');
  };

  window.resetBottomNavLayout = function(){
    if(!confirm('Reset bottom bar layout?')) return;
    localStorage.removeItem(NAV_KEY);
    renderBottomNav();
    renderBottomNavControls();
  };

  window.moveBottomNavItem = function(id, dir){
    const layout = readLayout();
    const i = layout.findIndex(x=>x.id===id);
    const j = i + dir;
    if(i < 0 || j < 0 || j >= layout.length) return;
    [layout[i], layout[j]] = [layout[j], layout[i]];
    writeLayout(layout);
    renderBottomNav();
    renderBottomNavControls();
  };

  // Wrap existing show so active state updates after page change
  const oldShow = window.show;
  if(typeof oldShow === 'function' && !oldShow.__customBottomNavWrapped){
    window.show = function(id, tab){
      const res = oldShow.apply(this, arguments);
      setTimeout(renderBottomNav, 50);
      return res;
    };
    window.show.__customBottomNavWrapped = true;
  }

  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(function(){
      renderBottomNav();
      renderBottomNavControls();
    }, 200);
  });

  window.renderBottomNav = renderBottomNav;
  window.renderBottomNavControls = renderBottomNavControls;
})();
</script>


<script>
/* AquoraX Nav Safety Lock
   Prevents users locking themselves out of Customise/Settings/Tools.
   Home is always visible. At least one gateway tab is always visible: Style or More.
*/
(function(){
  const NAV_KEY = 'aquorax_bottom_nav_layout';
  const GATEWAY_IDS = ['customise','settings'];

  function readNav(){
    try{
      const raw = localStorage.getItem(NAV_KEY);
      const parsed = raw ? JSON.parse(raw) : null;
      return Array.isArray(parsed) ? parsed : null;
    }catch(e){
      return null;
    }
  }

  function writeNav(layout){
    try{
      localStorage.setItem(NAV_KEY, JSON.stringify(layout));
    }catch(e){}
  }

  function enforceNavSafety(){
    let layout = readNav();

    if(!layout){
      return;
    }

    let changed = false;

    // Home must always exist and show
    let home = layout.find(x => x.id === 'home');
    if(!home){
      layout.unshift({id:'home', show:true});
      changed = true;
    }else if(home.show !== true){
      home.show = true;
      changed = true;
    }

    // At least one gateway must be visible
    let hasGateway = layout.some(x => GATEWAY_IDS.includes(x.id) && x.show === true);

    if(!hasGateway){
      let customise = layout.find(x => x.id === 'customise');
      if(customise){
        customise.show = true;
      }else{
        layout.push({id:'customise', show:true});
      }
      changed = true;
    }

    if(changed){
      writeNav(layout);
    }

    return changed;
  }

  // Run immediately so a broken layout repairs before render
  enforceNavSafety();

  // Patch saveBottomNavLayout so it cannot save a locked-out layout
  const oldSave = window.saveBottomNavLayout;
  if(typeof oldSave === 'function' && !oldSave.__navSafetyWrapped){
    window.saveBottomNavLayout = function(){
      const result = oldSave.apply(this, arguments);
      const changed = enforceNavSafety();

      if(changed){
        if(typeof renderBottomNav === 'function') renderBottomNav();
        if(typeof renderBottomNavControls === 'function') renderBottomNavControls();

        if(typeof aqxToast === 'function'){
          aqxToast('Style kept on for safety');
        }else{
          alert('Style has been kept on so you can always edit the app.');
        }
      }

      return result;
    };
    window.saveBottomNavLayout.__navSafetyWrapped = true;
  }

  // Patch reset/render too
  const oldRender = window.renderBottomNav;
  if(typeof oldRender === 'function' && !oldRender.__navSafetyRenderWrapped){
    window.renderBottomNav = function(){
      enforceNavSafety();
      return oldRender.apply(this, arguments);
    };
    window.renderBottomNav.__navSafetyRenderWrapped = true;
  }

  const oldControls = window.renderBottomNavControls;
  if(typeof oldControls === 'function' && !oldControls.__navSafetyControlsWrapped){
    window.renderBottomNavControls = function(){
      enforceNavSafety();
      return oldControls.apply(this, arguments);
    };
    window.renderBottomNavControls.__navSafetyControlsWrapped = true;
  }

  // Recovery helper for console
  window.aqxFixBottomNav = function(){
    enforceNavSafety();
    if(typeof renderBottomNav === 'function') renderBottomNav();
    if(typeof renderBottomNavControls === 'function') renderBottomNavControls();
  };

  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(function(){
      enforceNavSafety();
      if(typeof renderBottomNav === 'function') renderBottomNav();
      if(typeof renderBottomNavControls === 'function') renderBottomNavControls();
    }, 300);
  });
})();


/* AquoraX HARD Litres Input Fix v2 */
(function(){
  function isLitresInput(el){
    if(!el || el.tagName !== 'INPUT') return false;
    const id = (el.id || '').toLowerCase();

        return (lab && lab.textContent ? lab.textContent : '').toLowerCase();

      id.includes('litre') ||
      id.includes('liter') ||
      id.includes('tanklitres') ||
      name.includes('litre') ||
      name.includes('liter') ||
      ph.includes('litre') ||
      ph.includes('liter') ||
      ph === '500' ||
      labelText.includes('litres') ||
      labelText.includes('liters') ||
      labelText.includes('tank size')
    );
  }

  function normaliseLitresInputs(){
    document.querySelectorAll('input').forEach(function(el){
      if(!isLitresInput(el) || el.__aqxHardLitresFixed) return;

      el.__aqxHardLitresFixed = true;
      el.setAttribute('type','text');
      el.setAttribute('inputmode','numeric');
      el.setAttribute('pattern','[0-9]*');
      el.setAttribute('autocomplete','off');

      let justFocused = false;

      function selectAll(){
        justFocused = true;
        setTimeout(function(){
          try{
            el.focus();
            el.setSelectionRange(0, String(el.value || '').length);
          }catch(e){}
        }, 30);
        setTimeout(function(){ justFocused = false; }, 450);
      }

      el.addEventListener('focus', selectAll);
      el.addEventListener('pointerup', selectAll);
      el.addEventListener('touchend', selectAll, {passive:true});

      el.addEventListener('keydown', function(e){
        // If old value is selected, first number replaces it cleanly.
        const allowed = ['Backspace','Delete','Tab','ArrowLeft','ArrowRight','Home','End'];
        if(allowed.includes(e.key)) return;

        if(/^\d$/.test(e.key)){
          const start = el.selectionStart;
          const end = el.selectionEnd;
          const val = String(el.value || '');
          if(start === 0 && end === val.length && val.length){
            e.preventDefault();
            el.value = e.key;
            el.dispatchEvent(new Event('input', {bubbles:true}));
            setTimeout(function(){
              try{ el.setSelectionRange(el.value.length, el.value.length); }catch(err){}
            }, 0);
          }
          return;
        }

        // block non-numeric typing
        if(e.key.length === 1) e.preventDefault();
      });

      el.addEventListener('input', function(){
        const cleaned = String(el.value || '').replace(/[^\d]/g,'');
        if(cleaned !== el.value) el.value = cleaned;
      });

      el.addEventListener('blur', function(){
        // Do not force 500 back. Empty is allowed while editing; save functions can validate.
        if(el.value !== '') el.value = String(parseInt(el.value, 10) || '');
      });
    });
  }

  document.addEventListener('DOMContentLoaded', normaliseLitresInputs);
  setInterval(normaliseLitresInputs, 700);
  document.addEventListener('click', function(){ setTimeout(normaliseLitresInputs, 80); }, true);
})();

/* AquoraX Glass Transparency Slider Upgrade v1 */
(function(){
  function clampOpacity(v){
    v = parseFloat(v);
    if(isNaN(v)) v = .88;
    return Math.max(.03, Math.min(1, v));
  }

  function applyGlassOpacity(v){
    v = clampOpacity(v);
    document.documentElement.style.setProperty('--aqxPanelOpacity', v);
    localStorage.setItem('aqx_panel_opacity_real', String(v));

    const label = document.getElementById('panelOpacityValue');
    if(label) label.textContent = Math.round(v * 100) + '%';
  }

  function patchTransparencySlider(){
    const slider = document.getElementById('panelOpacity');
    if(!slider || slider.__aqxGlassSliderFixed) return;

    slider.__aqxGlassSliderFixed = true;
    slider.min = '0.03';
    slider.max = '1';
    slider.step = '0.01';

    const saved = localStorage.getItem('aqx_panel_opacity_real') || localStorage.getItem('aqxPanelOpacity') || slider.value || '.88';
    const opacity = clampOpacity(saved);
    slider.value = opacity;
    applyGlassOpacity(opacity);

    slider.addEventListener('input', function(){
      applyGlassOpacity(this.value);
    });

    slider.addEventListener('change', function(){
      applyGlassOpacity(this.value);
    });
  }

  const oldUpdateLoadoutPreview = window.updateLoadoutPreview;
  window.updateLoadoutPreview = function(){
    try{
      const slider = document.getElementById('panelOpacity');
      if(slider) applyGlassOpacity(slider.value);
    }catch(e){}
    if(typeof oldUpdateLoadoutPreview === 'function'){
      try{return oldUpdateLoadoutPreview.apply(this, arguments);}catch(e){}
    }
  };

  const oldSaveTheme = window.saveTheme;
  window.saveTheme = function(){
    try{
      const slider = document.getElementById('panelOpacity');
      if(slider) applyGlassOpacity(slider.value);
    }catch(e){}
    if(typeof oldSaveTheme === 'function'){
      return oldSaveTheme.apply(this, arguments);
    }
  };

  document.addEventListener('DOMContentLoaded', function(){
    patchTransparencySlider();
    const saved = localStorage.getItem('aqx_panel_opacity_real');
    if(saved !== null) applyGlassOpacity(saved);
  });

  setTimeout(patchTransparencySlider, 300);
  setTimeout(patchTransparencySlider, 1000);
  document.addEventListener('click', function(){
    setTimeout(patchTransparencySlider, 80);
  }, true);
})();

</script>
